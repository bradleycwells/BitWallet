name: BitWallet iOS build and test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches-ignore:
      - master
      - deployment-next

jobs:
  build:
    if: |
      contains(github.event.head_commit.message, 'ios-dev') || 
      contains(github.event.head_commit.message, 'ios-qa') ||
      contains(github.event.head_commit.message, 'ios-prod')
    name: Build iOS - ${{ github.event.head_commit.message }}
    runs-on: macos-latest

    env:
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      PLATFORM: iOS Simulator
      RUNTIME: com.apple.CoreSimulator.SimRuntime.iOS-26-2
      DEVICE_TYPE: com.apple.CoreSimulator.SimDeviceType.iPhone-16
      DEVICE_NAME: CI iPhone 16

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Environment Variables
        id: load_env
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"ios-dev"* ]]; then
            ENV_FILE=".env.dev"
          elif [[ "${{ github.event.head_commit.message }}" == *"ios-qa"* ]]; then
            ENV_FILE=".env.qa"
          elif [[ "${{ github.event.head_commit.message }}" == *"ios-prod"* ]]; then
            ENV_FILE=".env.prod"
          else
            echo "No matching env file for commit message"
            exit 1
          fi

          echo "----------------------------------"
          echo "Using $ENV_FILE"
          echo "----------------------------------"
          echo "Loading environment variables from $ENV_FILE"
          BASE_URL=$(grep '^BASE_URL=' "$ENV_FILE" | cut -d '=' -f2- | xargs)
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV
          echo "API_TOKEN=${{ secrets.API_TOKEN }}" >> $GITHUB_ENV
          echo "----------------------------------"

      - name: Resolve Scheme and Project/Workspace
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo "$scheme_list" | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo "$default" > default
          echo "Using default scheme: $(cat default)"

          if ls -A | grep -iq "\.xcworkspace$"; then
            echo "filetype_parameter=workspace" >> $GITHUB_ENV
            echo "file_to_build=$(ls -A | grep -i '\.xcworkspace$' | head -1 | xargs)" >> $GITHUB_ENV
          else
            echo "filetype_parameter=project" >> $GITHUB_ENV
            echo "file_to_build=$(ls -A | grep -i '\.xcodeproj$' | head -1 | xargs)" >> $GITHUB_ENV
          fi

      - name: Prepare Simulator
        run: |
          xcrun simctl shutdown all || true
          xcrun simctl erase all || true
          xcrun simctl delete unavailable || true
          # Create device if it doesn't exist
          if ! xcrun simctl list devices | grep -q "${DEVICE_NAME}"; then
            xcrun simctl create "${DEVICE_NAME}" "${DEVICE_TYPE}" "${RUNTIME}"
          fi
          xcrun simctl boot "${DEVICE_NAME}" || true
          xcrun simctl bootstatus "${DEVICE_NAME}" -b
          echo "DESTINATION=platform=${PLATFORM},name=${DEVICE_NAME}" >> $GITHUB_ENV

      - name: Build for Testing
        env:
          BASE_URL: ${{ env.BASE_URL }}
          API_TOKEN: ${{ env.API_TOKEN }}
        run: |
          echo "BASE_URL: $BASE_URL"
          echo "API_TOKEN: $API_TOKEN"

          scheme=$(cat default)
          echo "Building scheme: $scheme"
          echo "File: $file_to_build ($filetype_parameter)"
          echo "DerivedData: $DERIVED_DATA"
          echo "Destination: $DESTINATION"

          xcodebuild \
            -"$filetype_parameter" "$file_to_build" \
            -scheme "$scheme" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath "$DERIVED_DATA" \
            clean build-for-testing

      - name: Test without Building
        env:
          BASE_URL: ${{ env.BASE_URL }}
          API_TOKEN: ${{ env.API_TOKEN }}
        run: |
          scheme=$(cat default)
          echo "Testing scheme: $scheme"
          echo "File: $file_to_build ($filetype_parameter)"
          echo "DerivedData: $DERIVED_DATA"
          echo "Destination: $DESTINATION"

          # Ensure simulator is booted
          xcrun simctl boot "${DEVICE_NAME}" || true
          xcrun simctl bootstatus "${DEVICE_NAME}" -b

          xcodebuild \
            -"$filetype_parameter" "$file_to_build" \
            -scheme "$scheme" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath "$DERIVED_DATA" \
            test-without-building

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ${{ env.DERIVED_DATA }}/Build/Products/Debug-iphonesimulator/*.app
            ${{ env.DERIVED_DATA }}/Logs/Test
